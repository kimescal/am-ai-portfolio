kind: Deployment
apiVersion: apps/v1
metadata:
  name: am-ai-portfolio-app
  namespace: _namespace_
  labels:
    app: am-ai-portfolio-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: am-ai-portfolio-app
  template:
    metadata:
      labels:
        app: am-ai-portfolio-app
    spec:
      volumes:
        - name: lang-fast-conf
          configMap:
            name: lang-fast-conf
            optional: false
            items:
              - key: .env
                path: .env
              - key: logging.yaml
                path: logging.yaml
      containers:
        - name: am-ai-portfolio-app
          image: >-
            dockerhub.citicsinfo.com/_namespace_/am-ai-portfolio-app:_tag_
          ports:
            - containerPort: 8501
              protocol: TCP
          resources:
            limits:
              cpu: '2'
              memory: 4Gi
            requests:
              cpu: 10m
              memory: 50Mi
          volumeMounts:
            - name: lang-fast-conf
              mountPath: /app/.env
              subPath: .env
            - name: lang-fast-conf
              mountPath: /app/logging.yaml
              subPath: logging.yaml
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600

---
kind: Service
apiVersion: v1
metadata:
  name: am-ai-portfolio-app-svc
  namespace: _namespace_
  annotations:
    ovn.kubernetes.io/vpc: ovn-cluster
spec:
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
  selector:
    app: am-ai-portfolio-app
  type: ClusterIP
  sessionAffinity: None
