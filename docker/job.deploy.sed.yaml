kind: CronJob
apiVersion: batch/v1beta1
metadata:
  name: employee-dynamic-report
  namespace: am-ai-portfolio
  labels:
    source: cmp
  annotations: {}
spec:
  schedule: "0 20 * * 0"
  concurrencyPolicy: Replace
  suspend: false
  jobTemplate:
    metadata:
    spec:
      backoffLimit: 1
      template:
        metadata:
          creationTimestamp: null
          annotations:
            ovn.kubernetes.io/snat: 172.22.162.195
        spec:
          volumes:
            - name: lang-fast-conf
              configMap:
                name: lang-fast-conf
                optional: false
                items:
                  - key: .env
                    path: .env
                  - key: dynamic_report_job_config.json
                    path: dynamic_report_job_config.json
                  - key: logging.yaml
                    path: logging.yaml
            - name: data-pvc
              persistentVolumeClaim:
                claimName: pvc-common-rw-0
          containers:
            - name: sync
              image: >-
                dockerhub.citicsinfo.com/am-ai-portfolio/job-portfolio:_tag_
              command: [ "sh", "-c", "python -m jobs.dynamic_report_job.run --level employee --period week --max-concurrent 8 --templates employee_visit --push-type text --regions '银行客群团队' '私行客群团队' '企业客群团队' '保险客群团队' '华南区域团队' '华东区域团队' '跨境区域团队' '中台' && python -m jobs.dynamic_report_job.run --level employee --period week --max-concurrent 8 --templates employee_north_visit --push-type text --regions '华北区域团队'" ]
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - name: lang-fast-conf
                  mountPath: /app/.env
                  subPath: .env
                - name: lang-fast-conf
                  mountPath: /app/jobs/dynamic_report_job/dynamic_report_job_config.json
                  subPath: dynamic_report_job_config.json
                - name: lang-fast-conf
                  mountPath: /app/logging.yaml
                  subPath: logging.yaml
                - name: data-pvc
                  mountPath: /app/reports/
                  subPath: reports/employee-dynamic-reports/
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
          dnsPolicy: ClusterFirst
          serviceAccountName: gitlab-ci
          serviceAccount: gitlab-ci
          securityContext: {}
          imagePullSecrets:
            - name: harbor-secret
          schedulerName: default-scheduler
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1

