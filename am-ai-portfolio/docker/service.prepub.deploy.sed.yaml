kind: Deployment
apiVersion: apps/v1
metadata:
  name: am-ai-portfolio-service-prepub
  namespace: _namespace_
  labels:
    app: am-ai-portfolio-service-prepub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: am-ai-portfolio-service-prepub
  template:
    metadata:
      labels:
        app: am-ai-portfolio-service-prepub
    spec:
      volumes:
        - name: lang-fast-prepub-conf
          configMap:
            name: lang-fast-prepub-conf
            optional: false
            items:
              - key: .env
                path: .env
              - key: logging.yaml
                path: logging.yaml
              - key: sql_permission_config.json
                path: sql_permission_config.json
              - key: dynamic_report_job_config.json
                path: dynamic_report_job_config.json
        - name: pvc-common-rw-0
          persistentVolumeClaim:
            claimName: pvc-common-rw-0
      containers:
        - name: am-ai-portfolio-service-prepub
          image: >-
            dockerhub.citicsinfo.com/_namespace_/am-ai-portfolio-service-prepub:_tag_
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: '4'
              memory: 16Gi
            requests:
              cpu: 10m
              memory: 50Mi
          volumeMounts:
            - name: lang-fast-prepub-conf
              mountPath: /app/.env
              subPath: .env
            - name: lang-fast-prepub-conf
              mountPath: /app/logging.yaml
              subPath: logging.yaml
            - name: lang-fast-prepub-conf
              mountPath: /app/agents/tools/sql_permission_config.json
              subPath: sql_permission_config.json
            - name: pvc-common-rw-0
              mountPath: /app/db
              subPath: prepub/db
            - name: pvc-common-rw-0
              mountPath: /shared
              subPath: shared
            - name: lang-fast-prepub-conf
              mountPath: /app/agents/tools/dynamic_report_job_config.json
              subPath: dynamic_report_job_config.json
            - name: lang-fast-prepub-conf
              mountPath: /app/jobs/dynamic_report_job/dynamic_report_job_config.json
              subPath: dynamic_report_job_config.json
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          command: [ "uvicorn" ]
          args: ["service:app", "--host", "0.0.0.0", "--port", "8080", "--reload","--log-config","/app/logging.yaml"]
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600

---
kind: Service
apiVersion: v1
metadata:
  name: am-ai-portfolio-service-prepub-svc
  namespace: _namespace_
  annotations:
    ovn.kubernetes.io/vpc: ovn-cluster
spec:
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    app: am-ai-portfolio-service-prepub
  type: ClusterIP
  sessionAffinity: None
